<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width initial-scale1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>My website</title>
    <style>
        body {
            background-color: #fce4ec;
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        svg {
            width: 24px;
            height: 24px;
        }

        section {
            padding: 30px 15px;
        }

        .contactdetails {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            /* ✅ important for responsiveness */
        }

        .contactdetails div {
            background-color: white;
            padding: 15px;
            width: 250px;
            min-height: 150px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-direction: column;
        }

        /* FORM STYLES */
        form {
            max-width: 400px;
            margin: 30px auto 0;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        form input,
        form textarea {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            font-size: 16px;
            width: 100%;
        }

        form textarea {
            height: 100px;
            resize: none;
        }

        button {
            padding: 12px;
            border: none;
            border-radius: 8px;
            background-color: palevioletred;
            color: white;
            font-size: 16px;
            cursor: pointer;
        }

        h3,
        p {
            margin: 0;
        }

        /* 📱 MOBILE SCREEN */
        @media (max-width: 768px) {
            .contactdetails {
                flex-direction: column;
                align-items: center;
            }

            .contactdetails div {
                width: 100%;
                max-width: 320px;
            }
        }
    </style>
</head>

        <div>
            <h2>Get in Touch</h2>
            <div>
                <div class="contactdetails">
                    <div>
                        <h3>Our location</h3>
                        <p>Sugar land, Ice city
                            pincode-123 456.
                        </p>
                    </div>
                    <div>
                        <h3>Daily service timing</h3>
                        <p>10.00 AM - 9.00 PM</p>
                    </div>
                    <div>
                        <h3>Contact details</h3>
                        <p>Email:info@frozenicecreams.in</p>
                        <p>For more details:1400 123 456</p>
                    </div>
                </div>
                <div>
                    <h4>Send us message</h4>
                    <form id="contactForm">
                        <input type="text" name="name" id="name" maxlength="50" placeholder="Name" required>
                        <input type="email" name="email" id="email" maxlength="50" placeholder="Email" required>
                        <textarea name="message" id="message" maxlength="500" placeholder="Message" required></textarea>
                        <button type="button" onclick="showResponse()">Scoopy Message</button>
                    </form>

                    <!-- Response will appear here -->
                    <div id="responseBox"></div>

                </div>
            </div>
        </div>
    </section>
</body>

<script>
    function showResponse() {
        const name = document.getElementById("name").value;
        const email = document.getElementById("email").value;
        const message = document.getElementById("message").value;

        if (name === "" || email === "" || message === "") {
            alert("Please fill all fields");
            return;
        }

        document.getElementById("responseBox").innerHTML = `
            <h3>Message Sent 🍦</h3>
            <p><strong>Name:</strong> ${name}</p>
            <p><strong>Email:</strong> ${email}</p>
            <p><strong>Message:</strong> ${message}</p>
    `;
        document.getElementById("contactForm").reset();
    }
