<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <title>Navbar-1</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: rgb(200, 229, 246);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            height: 100vh;
            background: white;
            padding: 20px;
            position: fixed;
            left: 0;
            top: 0;
            transition: transform 0.3s ease;
        }

        /* Logo */
        .logo {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 20px;
        }

        /* Button */
        .newproject {
            width: 100%;
            padding: 10px;
            background: #1f75d8;
            border: 0;
            border-radius: 10px;
            color: white;
            margin: 20px 0;
            cursor: pointer;
        }

        /* Menu */
        .navbar {
            list-style: none;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .navbar-menu a {
            display: flex;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            color: black;
            cursor: pointer;
        }

        .navbar-menu a:hover,
        .active {
            background: #e7f0ff;
            color: #1f75d8;
        }

        /* Bottom section */
        .bottom {
            position: absolute;
            bottom: 20px;
            width: 80%;
        }

        .logout {
            width: 100%;
            padding: 10px;
            border: 0;
            border-radius: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        /* Mobile */
        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
            }

            .sidebar.show {
                transform: translateX(0);
            }

            .close-btn {
                cursor: pointer;
            }
        }

        /* Mobile Header */
        .mobile-header {
            display: none;
            background: white;
            padding: 15px 20px;
            font-size: 20px;
            align-items: center;
            gap: 15px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Show header on mobile */
        @media (max-width: 768px) {
            .mobile-header {
                display: flex;
            }

            .sidebar {
                transform: translateX(-100%);
                z-index: 1000;
            }

            .sidebar.show {
                transform: translateX(0);
            }
        }
    </style>
</head>

<body>
    <header class="mobile-header">
        <i class="fa fa-bars menu-btn"></i>
        <span class="title">Glow<b>Hub</b></span>
    </header>

    <div class="sidebar">
        <div class="logo">
            <div>
                <span style="color:#1f75d8;">
                    Glow
                </span><b>Hub</b>
            </div>
            <i class="fa fa-close close-btn"></i>
        </div>

        <button class="newproject">
            <i class="fa fa-plus"></i> New
        </button>

        <ul class="navbar">
            <li class="navbar-menu">
                <a class="active"><i class="fa fa-th-large"></i> Dashboard</a>
            </li>
            <li class="navbar-menu">
                <a><i class="fa fa-briefcase"></i> Projects</a>
            </li>
            <li class="navbar-menu">
                <a><i class="fa fa-clock-o"></i> Time Tracking</a>
            </li>
            <li class="navbar-menu">
                <a><i class="fa fa-users"></i> Clients</a>
            </li>
            <li class="navbar-menu">
                <a><i class="fa fa-sticky-note-o"></i> Invoices</a>
            </li>
            <li class="navbar-menu">
                <a><i class="fa fa-comment-o"></i> Messages</a>
            </li>
        </ul>

        <div class="bottom">
            <ul class="navbar">
                <li class="navbar-menu">
                    <a><i class="fa fa-cog"></i> Settings</a>
                </li>
                <li class="navbar-menu">
                    <a><i class="fa fa-question-circle-o"></i> Support</a>
                </li>
            </ul>
            <button class="logout">
                <i class="fa fa-sign-out"></i> Logout
            </button>
        </div>
    </div>
</body>

</html>

<script>
    const menuBtn = document.querySelector(".menu-btn");
    const closeBtn = document.querySelector(".close-btn");
    const sidebar = document.querySelector(".sidebar");

    menuBtn.addEventListener("click", () => {
        sidebar.classList.add("show");
    });

    closeBtn.addEventListener("click", () => {
        sidebar.classList.remove("show");
    });
</script>
